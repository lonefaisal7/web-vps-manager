<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup – Web VPS Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top left, #1f2937 0, #020617 40%, #000000 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }
    .glass-panel {
      background: radial-gradient(circle at top left, rgba(148,163,184,0.07), rgba(15,23,42,0.90));
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
    }
    .mac-btn { transition: transform 0.1s ease, box-shadow 0.2s ease, filter 0.2s ease; }
    .mac-btn:active { transform: scale(0.97) translateY(1px); filter: brightness(0.9); }
    .fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; transform: translateY(10px); }
    @keyframes fadeIn { to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white overflow-hidden">

  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute -top-32 -left-20 w-80 h-80 bg-emerald-500/20 blur-3xl rounded-full"></div>
    <div class="absolute -bottom-32 right-0 w-96 h-96 bg-sky-500/15 blur-3xl rounded-full"></div>
  </div>

  <div class="glass-panel fade-in border border-white/10 rounded-3xl shadow-2xl shadow-black/70 max-w-lg w-full mx-4 p-6 sm:p-8 relative">

    <div class="flex items-center justify-between mb-5">
      <div class="flex items-center gap-2">
        <span class="w-3 h-3 rounded-full bg-red-500 shadow shadow-red-700/60"></span>
        <span class="w-3 h-3 rounded-full bg-yellow-400 shadow shadow-yellow-600/60"></span>
        <span class="w-3 h-3 rounded-full bg-emerald-500 shadow shadow-emerald-600/60"></span>
      </div>
      <span class="text-[11px] text-gray-400 tracking-widest uppercase">First-time Setup</span>
    </div>

    <div class="flex flex-col items-center text-center mb-7">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-400 via-sky-500 to-indigo-500 flex items-center justify-center shadow-lg shadow-emerald-600/40 mb-3">
        <span class="text-2xl">🚀</span>
      </div>
      <h1 class="text-2xl font-semibold tracking-tight">Web VPS Manager</h1>
      <p class="text-gray-400 text-xs mt-1">Create your admin account to get started.</p>
      <div class="mt-4 bg-red-500/10 border border-red-500/40 rounded-2xl px-3 py-2 text-[11px] text-red-200 flex items-start gap-2">
        <span class="mt-0.5">⚠️</span>
        <span>FULL ROOT ACCESS ENABLED. Use behind HTTPS and firewall in production.</span>
      </div>
    </div>

    <form id="setupForm" class="space-y-4">
      <div>
        <label class="block text-[11px] uppercase tracking-widest text-gray-400 mb-1.5">Admin Username</label>
        <div class="rounded-2xl bg-black/40 border border-slate-700/80 focus-within:border-emerald-400/80 focus-within:ring-2 focus-within:ring-emerald-500/30 transition-all duration-200">
          <input id="username" type="text" placeholder="admin" required
            class="w-full bg-transparent rounded-2xl px-4 py-2.5 text-sm text-white placeholder:text-slate-500 outline-none" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-[11px] uppercase tracking-widest text-gray-400 mb-1.5">Password</label>
          <div class="rounded-2xl bg-black/40 border border-slate-700/80 focus-within:border-emerald-400/80 focus-within:ring-2 focus-within:ring-emerald-500/30 transition-all duration-200">
            <input id="password" type="password" placeholder="••••••••" required
              class="w-full bg-transparent rounded-2xl px-4 py-2.5 text-sm text-white placeholder:text-slate-500 outline-none" />
          </div>
        </div>
        <div>
          <label class="block text-[11px] uppercase tracking-widest text-gray-400 mb-1.5">Confirm</label>
          <div class="rounded-2xl bg-black/40 border border-slate-700/80 focus-within:border-emerald-400/80 focus-within:ring-2 focus-within:ring-emerald-500/30 transition-all duration-200">
            <input id="confirm" type="password" placeholder="••••••••" required
              class="w-full bg-transparent rounded-2xl px-4 py-2.5 text-sm text-white placeholder:text-slate-500 outline-none" />
          </div>
        </div>
      </div>
      <div id="msg" class="hidden text-xs text-red-200 bg-red-500/10 border border-red-500/40 rounded-2xl px-3 py-2"></div>
      <button type="submit" class="mac-btn w-full flex items-center justify-center gap-2 rounded-full bg-gradient-to-r from-emerald-400 via-sky-500 to-indigo-500 text-slate-950 font-semibold text-sm py-2.5 shadow-lg shadow-emerald-600/40 hover:shadow-emerald-400/60 hover:-translate-y-0.5 transition-all duration-300">
        Create Admin Account
      </button>
    </form>
    <p class="mt-4 text-[10px] text-gray-600 text-center">Credentials stored locally on this server. Keep this panel behind a firewall.</p>
  </div>

  <script>
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirm').value;
      const msg = document.getElementById('msg');
      msg.classList.add('hidden');
      if (p !== c) { msg.textContent = 'Passwords do not match'; msg.classList.remove('hidden'); return; }
      const fd = new FormData();
      fd.append('username', u); fd.append('password', p);
      const r = await fetch('/api/setup', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.success) window.location.href = '/dashboard';
      else { msg.textContent = d.error || 'Error during setup'; msg.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
