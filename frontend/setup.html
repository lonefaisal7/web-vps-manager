<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup – Web VPS Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
  <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8 w-full max-w-md shadow-2xl">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🚀</div>
      <h1 class="text-2xl font-bold text-emerald-400">Web VPS Manager</h1>
      <p class="text-gray-400 text-sm mt-1">First-time Setup</p>
      <div class="mt-3 bg-red-900/40 border border-red-700 rounded-lg p-2 text-xs text-red-300">
        ⚠️ FULL ROOT ACCESS ENABLED – Use with caution
      </div>
    </div>
    <form id="setupForm" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">Admin Username</label>
        <input id="username" type="text" placeholder="admin" required
          class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-emerald-500 transition" />
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input id="password" type="password" placeholder="••••••••" required
          class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-emerald-500 transition" />
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
        <input id="confirm" type="password" placeholder="••••••••" required
          class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-emerald-500 transition" />
      </div>
      <div id="msg" class="text-sm text-red-400 hidden"></div>
      <button type="submit"
        class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2.5 rounded-lg transition duration-200">
        Create Admin Account
      </button>
    </form>
  </div>
  <script>
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirm').value;
      const msg = document.getElementById('msg');
      if (p !== c) { msg.textContent = 'Passwords do not match'; msg.classList.remove('hidden'); return; }
      const fd = new FormData();
      fd.append('username', u); fd.append('password', p);
      const r = await fetch('/api/setup', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.success) window.location.href = '/dashboard';
      else { msg.textContent = d.error || 'Error'; msg.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
